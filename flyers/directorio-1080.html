<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Flyer Directorio Red EPA — 1080×1080</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --epa-green: #739600;
      --epa-green-dark: #5a7600;
      --epa-blue: #4f759b;
      --epa-blue-dark: #3f5e7d;
      --foreground: #000000;
      --muted: #636363;
      --accent: #f5f6f8;
      --surface: #fafafa;
    }
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    html,
    body {
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, Arial, sans-serif;
      background: #d8d8d8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px;
    }
    .flyer {
      width: 1080px;
      height: 1080px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    }

    /* Header geométrico — grafo de nodos verdes y azules */
    .network-header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 280px;
      z-index: 0;
      display: block;
      background: #fafbf6;
    }

    /* Decorativo: gradient sutil en la esquina inferior */
    .bg-decor {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      width: 720px;
      height: 720px;
      border-radius: 50%;
    }
    .bg-decor.blue {
      background: radial-gradient(circle, var(--epa-blue) 0%, transparent 65%);
      bottom: -260px;
      left: -260px;
      opacity: 0.08;
    }

    /* Content layout */
    .content {
      position: relative;
      z-index: 1;
      padding: 340px 96px 80px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .eyebrow {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--epa-blue);
    }
    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 76px;
      line-height: 1.04;
      letter-spacing: -0.02em;
      color: var(--foreground);
      margin: 20px 0 0;
    }
    h1 .accent {
      color: var(--epa-green);
    }
    .lead {
      margin: 40px 0 0;
      font-size: 30px;
      line-height: 1.45;
      color: var(--muted);
      max-width: 92%;
    }
    .cta {
      margin-top: auto;
      padding-top: 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
    }
    .url-pill {
      display: inline-block;
      background: var(--epa-green);
      color: #ffffff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 48px;
      letter-spacing: -0.01em;
      padding: 18px 36px;
      border-radius: 12px;
      text-decoration: none;
    }
    .logo {
      width: 220px;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* ===================================================================
       PRINT a PDF — fuerza tamaño de página 1080×1080 sin márgenes.
       Cómo usar:
         1. Cmd+P (Imprimir)
         2. Destination: "Save as PDF"
         3. "More settings" → Margins: None
         4. Scale: 100% (Default)
         5. Background graphics: ON (importante para que aparezcan
            los colores y el grafo)
         6. Save
       =================================================================== */
    @page {
      size: 1080px 1080px;
      margin: 0;
    }
    @media print {
      body {
        background: none;
        padding: 0;
        margin: 0;
        display: block;
        min-height: 0;
      }
      .flyer {
        box-shadow: none;
        margin: 0;
        width: 1080px;
        height: 1080px;
      }
    }
  </style>
</head>
<body>
  <div class="flyer">
    <!-- Header geométrico: grafo de nodos -->
    <svg
      class="network-header"
      viewBox="0 0 1080 280"
      xmlns="http://www.w3.org/2000/svg"
      preserveAspectRatio="xMidYMid slice"
    >
      <!-- Línea decorativa verde superior -->
      <rect x="0" y="0" width="1080" height="6" fill="#739600" />

      <!-- Líneas (conexiones entre nodos) — debajo de los círculos -->
      <g fill="none" stroke-width="2">
        <line x1="100" y1="120" x2="240" y2="180" stroke="#4f759b" stroke-opacity="0.45" />
        <line x1="240" y1="180" x2="380" y2="90" stroke="#739600" stroke-opacity="0.45" />
        <line x1="380" y1="90" x2="520" y2="200" stroke="#4f759b" stroke-opacity="0.45" />
        <line x1="520" y1="200" x2="660" y2="110" stroke="#739600" stroke-opacity="0.45" />
        <line x1="660" y1="110" x2="800" y2="220" stroke="#4f759b" stroke-opacity="0.45" />
        <line x1="800" y1="220" x2="940" y2="130" stroke="#739600" stroke-opacity="0.45" />
        <line x1="100" y1="120" x2="380" y2="90" stroke="#4f759b" stroke-opacity="0.25" />
        <line x1="240" y1="180" x2="520" y2="200" stroke="#739600" stroke-opacity="0.25" />
        <line x1="380" y1="90" x2="660" y2="110" stroke="#739600" stroke-opacity="0.25" />
        <line x1="520" y1="200" x2="800" y2="220" stroke="#4f759b" stroke-opacity="0.25" />
        <line x1="660" y1="110" x2="940" y2="130" stroke="#4f759b" stroke-opacity="0.25" />
        <line x1="940" y1="130" x2="1020" y2="220" stroke="#739600" stroke-opacity="0.4" />
      </g>

      <!-- Anillos alrededor de los nodos grandes -->
      <circle cx="100" cy="120" r="32" fill="none" stroke="#739600" stroke-width="2" stroke-opacity="0.3" />
      <circle cx="520" cy="200" r="34" fill="none" stroke="#4f759b" stroke-width="2" stroke-opacity="0.3" />
      <circle cx="940" cy="130" r="38" fill="none" stroke="#739600" stroke-width="2" stroke-opacity="0.3" />

      <!-- Nodos (círculos sólidos) -->
      <circle cx="100" cy="120" r="20" fill="#739600" />
      <circle cx="240" cy="180" r="11" fill="#4f759b" />
      <circle cx="380" cy="90" r="9" fill="#739600" />
      <circle cx="520" cy="200" r="22" fill="#4f759b" />
      <circle cx="660" cy="110" r="14" fill="#739600" />
      <circle cx="800" cy="220" r="11" fill="#4f759b" />
      <circle cx="940" cy="130" r="26" fill="#739600" />
      <circle cx="1020" cy="220" r="9" fill="#4f759b" />
    </svg>

    <div class="bg-decor blue"></div>

    <div class="content">
      <p class="eyebrow">Convocatoria abierta · Latinoamérica</p>

      <h1>
        Súmate al directorio de
        <span class="accent">quienes investigan en educación</span>
        en Latinoamérica.
      </h1>

      <p class="lead">
        Encuentra colaboradores por tema o metodología y haz visible tu
        trabajo en una red institucional permanente.
      </p>

      <div class="cta">
        <a
          class="url-pill"
          href="https://redepa.net"
          target="_blank"
          rel="noopener noreferrer"
        >
          redepa.net
        </a>
        <img
          class="logo"
          src="../public/logos/epa.png"
          alt="Red EPA — Red Latinoamericana Evidencias para el Aula"
        />
      </div>
    </div>
  </div>
</body>
</html>
